<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            color: #eee;
            min-height: 100vh;
            line-height: 1.6;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d9ff 0%, #00b8d4 50%, #0097a7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 217, 255, 0.3);
        }
        
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            background: rgba(22, 33, 62, 0.6);
            padding: 12px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 217, 255, 0.1);
        }
        
        .search-box input {
            flex: 1;
            padding: 14px 18px;
            border: none;
            border-radius: 12px;
            background: rgba(26, 26, 46, 0.8);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .search-box input:focus {
            background: rgba(26, 26, 46, 1);
            box-shadow: 0 0 0 2px rgba(0, 217, 255, 0.3);
        }
        
        .search-box input::placeholder {
            color: #666;
        }
        
        .search-box button {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #00d9ff 0%, #00b8d4 100%);
            color: #1a1a2e;
            font-size: 16px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 217, 255, 0.4);
        }
        
        .search-box button:active {
            transform: translateY(0);
        }
        
        .now-playing {
            background: linear-gradient(135deg, rgba(22, 33, 62, 0.8) 0%, rgba(26, 26, 46, 0.9) 100%);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 217, 255, 0.15);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .now-playing h2 {
            color: #00d9ff;
            margin-bottom: 20px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }
        
        .now-playing .artwork {
            width: 180px;
            height: 180px;
            margin: 0 auto 20px;
            border-radius: 16px;
            background: linear-gradient(135deg, #16213e 0%, #1f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }
        
        .now-playing .artwork::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.1) 0%, transparent 50%);
        }
        
        .now-playing .artwork img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }
        
        .now-playing .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        
        .now-playing .artist {
            color: #00d9ff;
            font-size: 16px;
            font-weight: 500;
        }
        
        .now-playing .empty {
            color: #666;
            font-style: italic;
            padding: 40px 0;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin: 20px 0 10px;
            overflow: hidden;
            position: relative;
        }
        
        .progress-bar .progress {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff 0%, #00b8d4 100%);
            border-radius: 2px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
        }
        
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 25px 0;
        }
        
        .controls button {
            padding: 15px 25px;
            border: none;
            border-radius: 12px;
            background: rgba(22, 33, 62, 0.8);
            color: #fff;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 217, 255, 0.1);
        }
        
        .controls button:hover {
            background: rgba(0, 217, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 217, 255, 0.2);
        }
        
        .controls button:active {
            transform: translateY(0);
        }
        
        .controls button.play-pause {
            padding: 20px 35px;
            background: linear-gradient(135deg, #00d9ff 0%, #00b8d4 100%);
            color: #1a1a2e;
            font-size: 22px;
            border: none;
        }
        
        .controls button.play-pause:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.4);
        }
        
        .controls button.active {
            background: linear-gradient(135deg, #00d9ff 0%, #00b8d4 100%);
            color: #1a1a2e;
        }
        
        .volume-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            padding: 15px 25px;
            background: rgba(22, 33, 62, 0.6);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        
        .volume-control input[type="range"] {
            width: 150px;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
        }
        
        .volume-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #00d9ff 0%, #00b8d4 100%);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(0, 217, 255, 0.4);
            transition: all 0.2s ease;
        }
        
        .volume-control input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        
        .volume-control span {
            font-size: 20px;
        }
        
        #volumeValue {
            font-size: 14px;
            color: #00d9ff;
            font-weight: 600;
            min-width: 40px;
        }
        
        .queue {
            background: rgba(22, 33, 62, 0.6);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 217, 255, 0.1);
        }
        
        .queue h3 {
            margin-bottom: 20px;
            color: #00d9ff;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .queue-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }
        
        .queue-list::-webkit-scrollbar {
            width: 6px;
        }
        
        .queue-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }
        
        .queue-list::-webkit-scrollbar-thumb {
            background: rgba(0, 217, 255, 0.3);
            border-radius: 3px;
        }
        
        .queue-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 8px;
            border: 1px solid transparent;
        }
        
        .queue-item:hover {
            background: rgba(0, 217, 255, 0.1);
            border-color: rgba(0, 217, 255, 0.2);
        }
        
        .queue-item.playing {
            background: linear-gradient(90deg, rgba(0, 217, 255, 0.15) 0%, rgba(0, 184, 212, 0.1) 100%);
            border-left: 3px solid #00d9ff;
        }
        
        .queue-item .index {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            color: #888;
        }
        
        .queue-item.playing .index {
            background: linear-gradient(135deg, #00d9ff 0%, #00b8d4 100%);
            color: #1a1a2e;
        }
        
        .queue-item .thumbnail {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            background: linear-gradient(135deg, #16213e 0%, #1f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .queue-item .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }
        
        .queue-item .info {
            flex: 1;
            min-width: 0;
        }
        
        .queue-item .title {
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }
        
        .queue-item .artist {
            color: #888;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .queue-item .remove {
            background: none;
            border: none;
            color: #ff4444;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.3s ease;
            opacity: 0;
        }
        
        .queue-item:hover .remove {
            opacity: 1;
        }
        
        .queue-item .remove:hover {
            background: rgba(255, 68, 68, 0.2);
        }
        
        .queue-empty {
            text-align: center;
            padding: 40px;
            color: #666;
            font-style: italic;
        }
        
        .search-results {
            margin-bottom: 25px;
        }
        
        .search-results h3 {
            margin-bottom: 15px;
            color: #00d9ff;
            font-size: 16px;
        }
        
        .result-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            background: rgba(22, 33, 62, 0.6);
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        
        .result-item:hover {
            background: rgba(0, 217, 255, 0.1);
            border-color: rgba(0, 217, 255, 0.2);
            transform: translateX(5px);
        }
        
        .result-item .thumbnail {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            background: linear-gradient(135deg, #16213e 0%, #1f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .result-item .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .result-item .info {
            flex: 1;
            min-width: 0;
        }
        
        .result-item .title {
            font-weight: 600;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        
        .result-item .artist {
            color: #888;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .result-item button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #00d9ff 0%, #00b8d4 100%);
            color: #1a1a2e;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }
        
        .result-item button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 217, 255, 0.4);
        }
        
        .result-item button:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .clear-btn {
            background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%) !important;
            color: #fff !important;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.3s ease;
        }
        
        .clear-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 68, 68, 0.4);
        }
        
        .visualizer {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
            height: 30px;
            margin-top: 15px;
        }
        
        .visualizer-bar {
            width: 4px;
            background: linear-gradient(to top, #00d9ff 0%, #00b8d4 100%);
            border-radius: 2px;
            transition: height 0.1s ease;
            opacity: 0.8;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .now-playing.playing .artwork {
            animation: pulse 2s ease-in-out infinite;
        }
        
        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .search-box {
                flex-direction: column;
            }
            
            .search-box button {
                width: 100%;
            }
            
            .now-playing .artwork {
                width: 140px;
                height: 140px;
            }
            
            .controls button {
                padding: 12px 18px;
                font-size: 16px;
            }
            
            .controls button.play-pause {
                padding: 16px 28px;
                font-size: 18px;
            }
            
            .result-item .thumbnail,
            .queue-item .thumbnail {
                width: 45px;
                height: 45px;
            }
            
            .volume-control input[type="range"] {
                width: 100px;
            }
        }
        
        @media (max-width: 400px) {
            .container {
                padding: 15px;
            }
            
            .queue-item .remove {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Music Bot</h1>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search for songs...">
            <button onclick="search()">Search</button>
        </div>
        
        <div class="search-results" id="searchResults"></div>
        
        <div class="now-playing" id="nowPlayingSection">
            <h2>Now Playing</h2>
            <div class="artwork" id="artwork">
                <span>🎵</span>
            </div>
            <div id="nowPlaying">
                <div class="empty">No song playing</div>
            </div>
            <div class="progress-bar" id="progressBar" style="display: none;">
                <div class="progress" id="progress" style="width: 0%"></div>
            </div>
            <div class="time-info" id="timeInfo" style="display: none;">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
            <div class="visualizer" id="visualizer" style="display: none;">
                <div class="visualizer-bar" style="height: 10px"></div>
                <div class="visualizer-bar" style="height: 20px"></div>
                <div class="visualizer-bar" style="height: 15px"></div>
                <div class="visualizer-bar" style="height: 25px"></div>
                <div class="visualizer-bar" style="height: 18px"></div>
                <div class="visualizer-bar" style="height: 22px"></div>
                <div class="visualizer-bar" style="height: 12px"></div>
                <div class="visualizer-bar" style="height: 28px"></div>
                <div class="visualizer-bar" style="height: 16px"></div>
                <div class="visualizer-bar" style="height: 24px"></div>
                <div class="visualizer-bar" style="height: 14px"></div>
                <div class="visualizer-bar" style="height: 20px"></div>
            </div>
        </div>
        
        <div class="controls">
            <button onclick="previous()" title="Previous">⏮</button>
            <button id="playPauseBtn" class="play-pause" onclick="togglePlay()" title="Play/Pause">▶</button>
            <button onclick="stop()" title="Stop">⏹</button>
            <button onclick="next()" title="Next">⏭</button>
        </div>
        
        <div class="volume-control">
            <span>🔊</span>
            <input type="range" id="volume" min="0" max="100" value="80" onchange="setVolume(this.value)">
            <span id="volumeValue">80%</span>
        </div>
        
        <div class="queue">
            <h3>
                Queue
                <button class="clear-btn" onclick="clearQueue()">Clear All</button>
            </h3>
            <ul class="queue-list" id="queueList"></ul>
        </div>
    </div>

    <script>
        let ws;
        let state = null;
        let visualizerInterval = null;

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

            ws.onopen = () => {
                console.log('WebSocket opened successfully, readyState:', ws.readyState);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };

            ws.onmessage = (event) => {
                console.log('WebSocket received message:', event.data);
                try {
                    state = JSON.parse(event.data);
                    console.log('Parsed state:', state);
                    updateUI();
                } catch (e) {
                    console.error('Error parsing WebSocket message:', e);
                }
            };
            
            ws.onclose = (event) => {
                console.log('WebSocket closed, code:', event.code, 'reason:', event.reason);
                setTimeout(connect, 1000);
            };
        }

        function updateUI() {
            console.log('updateUI called, state:', state);
            if (!state) return;

            const nowPlayingSection = document.getElementById('nowPlayingSection');
            const artwork = document.getElementById('artwork');
            const nowPlaying = document.getElementById('nowPlaying');
            const progressBar = document.getElementById('progressBar');
            const timeInfo = document.getElementById('timeInfo');
            const visualizer = document.getElementById('visualizer');
            
            if (state.current) {
                nowPlayingSection.classList.add('playing');
                
                if (state.current.thumbnail) {
                    artwork.innerHTML = `<img src="${state.current.thumbnail}" alt="Album art">`;
                } else {
                    artwork.innerHTML = '<span>🎵</span>';
                }
                
                nowPlaying.innerHTML = `
                    <div class="title">${state.current.title}</div>
                    <div class="artist">${state.current.artist}</div>
                `;
                
                progressBar.style.display = 'block';
                timeInfo.style.display = 'flex';
                visualizer.style.display = 'flex';
                
                if (state.state === 'playing') {
                    startVisualizer();
                } else {
                    stopVisualizer();
                }
            } else {
                nowPlayingSection.classList.remove('playing');
                artwork.innerHTML = '<span>🎵</span>';
                nowPlaying.innerHTML = '<div class="empty">No song playing</div>';
                progressBar.style.display = 'none';
                timeInfo.style.display = 'none';
                visualizer.style.display = 'none';
                stopVisualizer();
            }

            const playPauseBtn = document.getElementById('playPauseBtn');
            playPauseBtn.innerHTML = state.state === 'playing' ? '⏸' : '▶';

            const volume = document.getElementById('volume');
            volume.value = state.volume;
            document.getElementById('volumeValue').textContent = state.volume + '%';

            const queueList = document.getElementById('queueList');
            console.log('Queue rendering - state.queue:', state.queue, 'length:', state.queue ? state.queue.length : 0);
            if (!state.queue || state.queue.length === 0) {
                console.log('Queue is empty, showing empty message');
                queueList.innerHTML = '<li class="queue-empty">Queue is empty</li>';
            } else {
                queueList.innerHTML = state.queue.map((item, index) => `
                    <li class="queue-item ${index === state.current_index ? 'playing' : ''}" onclick="playIndex(${index})">
                        <div class="index">${index + 1}</div>
                        <div class="thumbnail">
                            ${item.thumbnail ? `<img src="${item.thumbnail}" alt="">` : '🎵'}
                        </div>
                        <div class="info">
                            <div class="title">${item.title}</div>
                            <div class="artist">${item.artist}</div>
                        </div>
                        <button class="remove" onclick="event.stopPropagation(); removeFromQueue(${index})">✕</button>
                    </li>
                `).join('');
            }
        }

        function startVisualizer() {
            if (visualizerInterval) return;
            const bars = document.querySelectorAll('.visualizer-bar');
            visualizerInterval = setInterval(() => {
                bars.forEach(bar => {
                    const height = Math.random() * 20 + 5;
                    bar.style.height = height + 'px';
                });
            }, 100);
        }

        function stopVisualizer() {
            if (visualizerInterval) {
                clearInterval(visualizerInterval);
                visualizerInterval = null;
            }
            const bars = document.querySelectorAll('.visualizer-bar');
            bars.forEach(bar => {
                bar.style.height = '5px';
            });
        }

        async function search() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;

            try {
                const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const results = await res.json();

                const container = document.getElementById('searchResults');
                if (results.length === 0) {
                    container.innerHTML = '<h3>Search Results</h3><div style="text-align: center; padding: 30px; color: #666;">No results found</div>';
                    return;
                }
                
                container.innerHTML = `
                    <h3>Search Results</h3>
                    ${results.map((item) => `
                        <div class="result-item">
                            <div class="thumbnail">
                                ${item.thumbnail ? `<img src="${item.thumbnail}" alt="">` : '🎵'}
                            </div>
                            <div class="info">
                                <div class="title">${item.title}</div>
                                <div class="artist">${item.artist}</div>
                            </div>
                            <button class="add-btn">Add</button>
                        </div>
                    `).join('')}
                `;
                container.querySelectorAll('.add-btn').forEach((btn, idx) => {
                    const item = results[idx];
                    btn.onclick = () => addToQueue(item, btn);
                });
            } catch (error) {
                console.error('Search error:', error);
                alert('Failed to search. Please try again.');
            }
        }

        async function addToQueue(result, btnElement) {
            if (!result || !result.video_id) {
                console.error('Invalid result:', result);
                alert('Invalid song data');
                return;
            }
            try {
                btnElement.disabled = true;
                btnElement.textContent = 'Adding...';
                const res = await fetch('/api/queue/add', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(result)
                });
                if (!res.ok) {
                    throw new Error('Failed to add to queue');
                }
                btnElement.textContent = 'Added ✓';
                setTimeout(() => {
                    btnElement.disabled = false;
                    btnElement.textContent = 'Add';
                }, 2000);
            } catch (error) {
                console.error('Error adding to queue:', error);
                alert('Failed to add song to queue');
                btnElement.disabled = false;
                btnElement.textContent = 'Add';
            }
        }

        async function removeFromQueue(index) {
            try {
                await fetch(`/api/queue/remove?index=${index}`, {method: 'POST'});
            } catch (error) {
                console.error('Error removing from queue:', error);
            }
        }

        async function clearQueue() {
            if (!confirm('Are you sure you want to clear the queue?')) return;
            try {
                await fetch('/api/queue/clear', {method: 'POST'});
            } catch (error) {
                console.error('Error clearing queue:', error);
            }
        }

        async function playIndex(index) {
            try {
                await fetch(`/api/player/play?index=${index}`, {method: 'POST'});
            } catch (error) {
                console.error('Error playing index:', error);
            }
        }

        async function togglePlay() {
            try {
                if (state?.state === 'playing') {
                    await fetch('/api/player/pause', {method: 'POST'});
                } else {
                    await fetch('/api/player/play', {method: 'POST'});
                }
            } catch (error) {
                console.error('Error toggling play:', error);
            }
        }

        async function stop() {
            try {
                await fetch('/api/player/stop', {method: 'POST'});
            } catch (error) {
                console.error('Error stopping:', error);
            }
        }

        async function next() {
            try {
                await fetch('/api/player/next', {method: 'POST'});
            } catch (error) {
                console.error('Error going to next:', error);
            }
        }

        async function previous() {
            try {
                await fetch('/api/player/prev', {method: 'POST'});
            } catch (error) {
                console.error('Error going to previous:', error);
            }
        }

        async function setVolume(vol) {
            try {
                await fetch(`/api/player/volume?volume=${vol}`, {method: 'POST'});
            } catch (error) {
                console.error('Error setting volume:', error);
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') search();
        });

        connect();
    </script>
</body>
</html>
